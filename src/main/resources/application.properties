spring.application.name=ebdv-fdv

# Configuracon de la base de datos PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ebdv_fdv_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:ferchofrias}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Habiliar la recarga de Thymeleaf en desarrollo
spring.thymeleaf.cache=false

app.security.admin.user=admin@ejemplo.com
app.security.admin.pass=admin123

app.security.maestro.user=maestro@ejemplo.com
app.security.maestro.pass=maestro123

# CONFIGURACIÓN DE SEGURIDAD (Login de la App)
app.security.admin1.user=${ADMIN1_EMAIL:admin1@prueba.com}
app.security.admin1.pass=${ADMIN1_PASSWORD:claveLocal1}

app.security.admin2.user=${ADMIN2_EMAIL:admin2@prueba.com}
app.security.admin2.pass=${ADMIN2_PASSWORD:claveLocal2}