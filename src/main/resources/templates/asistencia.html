<div th:replace="~{base :: html}" xmlns:th="http://www.thymeleaf.org">

  <div th:fragment="content" class="max-w-6xl mx-auto space-y-6">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-gray-200 pb-5">
      <div>
        <h1 class="text-3xl font-semibold text-gray-900 tracking-tight">Control de Asistencia</h1>
        <p class="text-sm text-gray-500 mt-1">Registra la asistencia diaria haciendo un toque en las casillas.</p>
      </div>

      <div class="flex items-center gap-3">
        <label class="text-sm font-medium text-gray-600 whitespace-nowrap">Grupo:</label>
        <select class="bg-white border border-gray-300 rounded-lg px-4 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
          <option value="">Todos los grupos</option>
          <option value="Preescolar">Preescolar</option>
          <option value="Primaria Menor">Primaria Menor</option>
          <option value="Primaria Mayor">Primaria Mayor</option>
        </select>
      </div>
    </div>

    <form th:action="@{/asistencia/guardar}" method="POST" class="space-y-6">

      <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse align-middle">
            <thead class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase tracking-wider">
            <tr>
              <th class="py-4 px-6 text-center w-16">#</th>
              <th class="py-4 px-6">Nombre del Alumno</th>
              <th class="py-4 px-4 text-center w-24">Lun</th>
              <th class="py-4 px-4 text-center w-24">Mar</th>
              <th class="py-4 px-4 text-center w-24">Mié</th>
              <th class="py-4 px-4 text-center w-24">Jue</th>
              <th class="py-4 px-4 text-center w-24">Vie</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 text-sm text-gray-700 font-medium">

            <tr th:if="${#lists.isEmpty(ninos)}">
              <td colspan="7" class="py-10 text-center text-gray-400">
                <i class="bi bi-people text-3xl block mb-2"></i>
                No hay niños activos registrados para el pase de lista.
              </td>
            </tr>

            <tr th:each="nino, iter : ${ninos}" class="hover:bg-slate-50/80 transition-colors">

              <td class="py-4 px-6 text-center text-gray-400 font-mono" th:text="${iter.count}">1</td>

              <td class="py-4 px-6">
                <div class="font-semibold text-gray-900" th:text="${nino.nombreCompleto}">Nombre del Alumno</div>
                <div class="text-xs text-gray-400 font-normal mt-0.5" th:text="${nino.grupo}">Grupo</div>
              </td>

              <td class="py-4 px-4 text-center">
                <input type="checkbox" th:name="'asistencia_' + ${nino.id} + '_Lunes'"
                       th:checked="${nino.tieneAsistencia('Lunes')}"
                       class="w-6 h-6 text-blue-600 border-gray-300 rounded cursor-pointer focus:ring-blue-500">
              </td>
              <td class="py-4 px-4 text-center">
                <input type="checkbox" th:name="'asistencia_' + ${nino.id} + '_Martes'"
                       th:checked="${nino.tieneAsistencia('Martes')}"
                       class="w-6 h-6 text-blue-600 border-gray-300 rounded cursor-pointer focus:ring-blue-500">
              </td>
              <td class="py-4 px-4 text-center">
                <input type="checkbox" th:name="'asistencia_' + ${nino.id} + '_Miercoles'"
                       th:checked="${nino.tieneAsistencia('Miercoles')}"
                       class="w-6 h-6 text-blue-600 border-gray-300 rounded cursor-pointer focus:ring-blue-500">
              </td>
              <td class="py-4 px-4 text-center">
                <input type="checkbox" th:name="'asistencia_' + ${nino.id} + '_Jueves'"
                       th:checked="${nino.tieneAsistencia('Jueves')}"
                       class="w-6 h-6 text-blue-600 border-gray-300 rounded cursor-pointer focus:ring-blue-500">
              </td>
              <td class="py-4 px-4 text-center">
                <input type="checkbox" th:name="'asistencia_' + ${nino.id} + '_Viernes'"
                       th:checked="${nino.tieneAsistencia('Viernes')}"
                       class="w-6 h-6 text-blue-600 border-gray-300 rounded cursor-pointer focus:ring-blue-500">
              </td>
            </tr>

            </tbody>
          </table>
        </div>
      </div>

      <div class="flex justify-end pt-2">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-xl shadow-sm transition-all flex items-center gap-2 text-sm">
          <i class="bi bi-cloud-arrow-up text-base"></i>
          <span>Guardar Asistencia</span>
        </button>
      </div>

    </form>

  </div>
</div>
