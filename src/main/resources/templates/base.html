<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>EBDV 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased" x-data="{ mobileMenuOpen: false }">

<div class="md:hidden flex items-center justify-between bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-40">
    <div class="flex items-center gap-2">
        <i class="bi bi-book-half text-blue-600 text-2xl"></i>
        <span class="bg-sky-100 text-sky-800 text-sm font-bold px-3 py-1.5 rounded-lg border border-sky-200">
                EBDV 2026
            </span>
    </div>
    <button @click="mobileMenuOpen = !mobileMenuOpen" class="text-gray-600 text-2xl">
        <i class="bi" :class="mobileMenuOpen ? 'bi-x-lg' : 'bi-list'"></i>
    </button>
</div>

<div class="flex min-h-screen">
    <aside class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 flex flex-col justify-between p-4 transform transition-transform duration-300 md:translate-x-0 md:static md:h-screen"
           :class="mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'">

        <div class="w-full">
            <div class="flex items-center gap-3 px-2 mb-8">
                <div class="w-20 h-20 flex items-center justify-center">
                    <img th:src="@{/images/logo.svg}"
                         class="h-full w-auto object-contain"
                         alt="Logo">
                </div>
                <div>
                    <h2 class="text-lg font-bold text-gray-800 leading-none">EBDV 2026</h2>
                    <p class="text-[10px] font-bold text-cyan-600 uppercase tracking-widest mt-1">Panel de Control</p>
                </div>
            </div>

            <nav class="space-y-1">
                <a th:href="@{/}" class="flex items-center gap-4 px-4 py-3 text-gray-700 font-medium rounded-r-full hover:bg-gray-100">
                    <i class="bi bi-house-door text-xl"></i>
                    <span>Inicio</span>
                </a>
                <a th:href="@{/asistencia}" class="flex items-center gap-4 px-4 py-3 text-gray-600 font-medium rounded-r-full hover:bg-gray-100">
                    <i class="bi bi-calendar-check text-xl"></i>
                    <span>Pase de Lista</span>
                </a>
                <a th:href="@{/registro}" class="flex items-center gap-4 px-4 py-3 text-gray-600 font-medium rounded-r-full hover:bg-gray-100">
                    <i class="bi bi-person-plus text-xl"></i>
                    <span>Registros</span>
                </a>
            </nav>
        </div>

        <div class="mt-auto border-t border-gray-200 p-4 space-y-4" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

            <div class="flex items-center gap-3 px-2">
                <div class="bg-blue-600 text-white rounded-full w-9 h-9 flex items-center justify-center font-bold text-sm shadow-sm">
                    <span th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Sesión Activa</p>
                    <p class="text-sm font-medium text-gray-700 truncate" sec:authentication="name">correo@ejemplo.com</p>
                </div>
            </div>

            <form th:action="@{/logout}" method="POST" class="w-full">
                <button type="submit"
                        class="w-full bg-slate-50 hover:bg-red-50 text-gray-600 hover:text-red-600 font-semibold px-4 py-2.5 rounded-xl text-sm transition-all flex items-center gap-3 border border-gray-200 hover:border-red-100 shadow-sm">
                    <i class="bi bi-box-arrow-right text-lg"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </form>

        </div>
    </aside>

    <div @click="mobileMenuOpen = false" class="fixed inset-0 bg-black/40 z-40 md:hidden" x-show="mobileMenuOpen"></div>

    <main class="flex-1 p-6 md:p-10">
        <div th:replace="~{::content}"></div>
    </main>
</div>

<script>
    window.addEventListener('pageshow', function (event) {
      // Si event.persisted es true, significa que la página se cargó desde el caché del botón "Atrás"
      // O si usamos la API de navegación moderna para comprobar si es un "back_forward"
      if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
        // Forzamos una recarga completa desde el servidor, lo que activará el filtro de Spring Security
        window.location.reload();
      }
    });
</script>

</body>
</html>
