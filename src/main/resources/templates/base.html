<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBDV 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased" x-data="{ mobileMenuOpen: false }">

<div class="md:hidden flex items-center justify-between bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-40">
    <div class="flex items-center gap-2">
        <i class="bi bi-book-half text-blue-600 text-2xl"></i>
        <span class="bg-sky-100 text-sky-800 text-sm font-bold px-3 py-1.5 rounded-lg border border-sky-200">
                EBDV 2026
            </span>
    </div>
    <button @click="mobileMenuOpen = !mobileMenuOpen" class="text-gray-600 text-2xl">
        <i class="bi" :class="mobileMenuOpen ? 'bi-x-lg' : 'bi-list'"></i>
    </button>
</div>

<div class="flex min-h-screen">
    <aside class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 flex flex-col justify-between p-4 transform transition-transform duration-300 md:translate-x-0 md:static md:h-screen"
           :class="mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'">

        <div class="w-full">
            <div class="hidden md:flex items-center gap-3 px-4 py-3 mb-6 border-b border-gray-100">
                <i class="bi bi-book-half text-blue-600 text-2xl"></i>
                <span class="bg-sky-100 text-sky-800 text-base font-bold px-4 py-2 rounded-xl border border-sky-200 tracking-wide">
                        EBDV 2026
                    </span>
            </div>

            <nav class="space-y-1">
                <a th:href="@{/}" class="flex items-center gap-4 px-4 py-3 text-gray-700 font-medium rounded-r-full hover:bg-gray-100">
                    <i class="bi bi-house-door text-xl"></i>
                    <span>Inicio</span>
                </a>
                <a th:href="@{/asistencia}" class="flex items-center gap-4 px-4 py-3 text-gray-600 font-medium rounded-r-full hover:bg-gray-100">
                    <i class="bi bi-calendar-check text-xl"></i>
                    <span>Pase de Lista</span>
                </a>
                <a th:href="@{/registro}" class="flex items-center gap-4 px-4 py-3 text-gray-600 font-medium rounded-r-full hover:bg-gray-100">
                    <i class="bi bi-person-plus text-xl"></i>
                    <span>Registros</span>
                </a>
            </nav>
        </div>

        <div class="w-full border-t border-gray-200 pt-4 space-y-3">
            <div class="flex items-center gap-3 px-3 py-2">
                <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-lg">C</div>
                <div class="flex flex-col min-w-0">
                    <span class="text-sm font-semibold text-gray-800 truncate">Coordinador Principal</span>
                    <span class="text-xs text-gray-500 truncate">ebdv@iglesia.org</span>
                </div>
            </div>
            <a href="#" class="flex items-center gap-4 px-4 py-3 text-red-600 font-medium rounded-xl hover:bg-red-50">
                <i class="bi bi-box-arrow-right text-xl"></i>
                <span>Cerrar Sesión</span>
            </a>
        </div>
    </aside>

    <div @click="mobileMenuOpen = false" class="fixed inset-0 bg-black/40 z-40 md:hidden" x-show="mobileMenuOpen"></div>

    <main class="flex-1 p-6 md:p-10">
        <div th:replace="~{::content}"></div>
    </main>
</div>

</body>
</html>
