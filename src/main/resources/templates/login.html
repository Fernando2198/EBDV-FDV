<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EBDV</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-gradient-to-br from-cyan-500 via-teal-600 to-emerald-700 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl border border-gray-100 shadow-xl p-8 space-y-6 transition-all hover:shadow-2xl/80">

    <div class="text-center space-y-2">
        <div class="mx-auto w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-md shadow-blue-500/20">
            <i class="bi bi-book-half text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight mt-4">Escuela Bíblica de Vacaciones</h1>
        <p class="text-sm text-gray-500">Ingresa tus credenciales para administrar el panel</p>
    </div>

    <div th:if="${param.error}" class="p-4 bg-red-50 border border-red-100 text-red-700 text-sm rounded-xl flex items-center gap-3">
        <i class="bi bi-exclamation-triangle-fill text-lg"></i>
        <span>Correo o contraseña incorrectos.</span>
    </div>

    <div th:if="${param.logout}" class="p-4 bg-emerald-50 border border-emerald-100 text-emerald-700 text-sm rounded-xl flex items-center gap-3">
        <i class="bi bi-check-circle-fill text-lg"></i>
        <span>Sesión cerrada correctamente. ¡Vuelve pronto!</span>
    </div>

    <form th:action="@{/login}" method="POST" class="space-y-4">

        <div class="space-y-1.5">
            <label for="username" class="text-xs font-semibold text-gray-600 uppercase tracking-wider">Correo Electrónico</label>
            <div class="relative">
          <span class="absolute inset-y-0 start-0 flex items-center ps-3.5 text-gray-400">
            <i class="bi bi-envelope"></i>
          </span>
                <input type="email" id="username" name="username" required placeholder="ejemplo@correo.com"
                       class="w-full bg-white border border-gray-200 rounded-xl ps-10 pe-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm">
            </div>
        </div>

        <div class="space-y-1.5">
            <label for="password" class="text-xs font-semibold text-gray-600 uppercase tracking-wider">Contraseña</label>
            <div class="relative">
          <span class="absolute inset-y-0 start-0 flex items-center ps-3.5 text-gray-400">
            <i class="bi bi-lock"></i>
          </span>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                       class="w-full bg-white border border-gray-200 rounded-xl ps-10 pe-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm">
            </div>
        </div>

        <button type="submit"
                class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-3 px-4 rounded-xl text-sm transition-all shadow-md shadow-cyan-500/10 hover:shadow-cyan-500/20 flex items-center justify-center gap-2 mt-2 cursor-pointer">            <span>Entrar al Panel</span>
            <i class="bi bi-arrow-right-short text-lg"></i>
        </button>

    </form>

    <p class="text-center text-xs text-gray-400 pt-2">
        © 2026 EBDV Control · Gestión de Asistencias Segura
    </p>

</div>

</body>
</html>
